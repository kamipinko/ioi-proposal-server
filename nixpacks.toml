[phases.setup]
nixPkgs = ["chromium", "nss", "nspr", "atk", "at-spi2-atk", "libdrm", "xorg.libX11",
           "xorg.libXcomposite", "xorg.libXdamage", "xorg.libXext", "xorg.libXfixes",
           "xorg.libXrandr", "xorg.libxcb", "mesa", "libxkbcommon", "pango", "cairo",
           "alsa-lib", "libcups", "dbus"]

[phases.install]
cmds = ["pip install -r requirements.txt", "playwright install chromium --with-deps"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
