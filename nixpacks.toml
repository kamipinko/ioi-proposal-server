[variables]
NIXPACKS_PYTHON_VERSION = "3.12"

[phases.setup]
nixPkgs = ["gobject-introspection", "cairo", "pango", "gdk-pixbuf", "libffi", "zlib", "glib", "shared-mime-info", "fontconfig", "harfbuzz", "freetype"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120"
